name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Guna FIREBASE_CONFIG_CONTENT untuk cipta fail config
      - name: Create Firebase Config
        run: echo "${{ secrets.FIREBASE_CONFIG_CONTENT }}" > firebase-config.js

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # Guna FIREBASE_SERVICE_ACCOUNT_KEY (ikut gambar secrets kau)
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          channelId: live
          projectId: ketickxguard
