name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Langkah ini akan cipta fail config secara automatik masa deploy
      - name: Create Firebase Config
        run: echo "${{ secrets.FIREBASE_CONFIG_CONTENT }}" > firebase-config.js

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KXGUARD }}'
          channelId: live
          projectId: ketickxguard
