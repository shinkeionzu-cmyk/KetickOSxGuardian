name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create Firebase Config File
        # Cara ni lebih selamat sebab dia guna format JSON yang bersih
        run: |
          echo "const firebaseConfig = ${{ secrets.FIREBASE_CONFIG }};" > firebase-config.js
          echo "export default firebaseConfig;" >> firebase-config.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          channelId: live
          projectId: ketickxguard
