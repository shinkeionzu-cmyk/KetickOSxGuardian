<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Architecture | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-style { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; border-radius: 1.2rem; padding: 12px 16px; font-size: 13px; color: white !important; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.05) !important; }
        
        .modal { opacity: 0; pointer-events: none; transition: 0.3s; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; p: 20px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        
        .module-chip { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .module-chip.selected { background: #3b82f6; color: white; border-color: #60a5fa; }
    </style>
</head>
<body class="p-6 md:p-12 pb-32">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter italic">System <span class="text-blue-500">Core</span></h1>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] mt-2">Personnel & Permission Control</p>
            </div>
            <button onclick="openUserModal()" class="bg-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-90 transition">
                <i class="fas fa-user-plus mr-2"></i> Add Personnel
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="userList">
            <div class="p-10 text-center opacity-20 uppercase tracking-[0.3em] font-black text-xs col-span-2">
                <i class="fas fa-spinner fa-spin mb-4 text-2xl"></i><br>Syncing Authorized Users...
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="glass w-full max-w-lg rounded-[3rem] p-10 border border-white/10 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-black uppercase tracking-tighter mb-8 italic">Personnel <span class="text-blue-500">Profile</span></h3>
            
            <form id="userForm" class="space-y-6">
                <input type="hidden" id="editUserId">
                
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-2 block tracking-widest">Nama Penuh</label>
                    <input type="text" id="userName" class="input-style" placeholder="NAMA KAKITANGAN" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-2 block tracking-widest">Security PIN (4 Digit)</label>
                        <input type="password" id="userPin" class="input-style text-center tracking-[1em]" maxlength="4" placeholder="****" required>
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-2 block tracking-widest">Tahap Akses</label>
                        <select id="userRole" class="input-style">
                            <option value="staff">STAFF</option>
                            <option value="admin">ADMIN</option>
                            <option value="owner">OWNER</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-4 block tracking-widest">Modul Dibenarkan</label>
                    <div class="flex flex-wrap gap-2" id="moduleSelection">
                        <div class="module-chip" data-id="pos">POS</div>
                        <div class="module-chip" data-id="stock">Stock</div>
                        <div class="module-chip" data-id="sales">Sales</div>
                        <div class="module-chip" data-id="HR">HR</div>
                        <div class="module-chip" data-id="accounting">Accounting</div>
                        <div class="module-chip" data-id="Anti-Fraud">Anti-Fraud</div>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 glass py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-400">Batal</button>
                    <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-blue-600/20">Simpan Profile</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, 
            getDoc, onSnapshot, query, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Import config dari root (parent folder)
        import firebaseConfig from '../firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Bridge to window
        window.db = db;
        window.fs = { collection, addDoc, doc, updateDoc, deleteDoc, getDoc, onSnapshot, query, orderBy };
        
        console.log("SETTINGS CORE: Ready");
        startUserSync();
    </script>

    <script>
        let selectedModules = [];

        // UI: Module Chip Selection
        document.querySelectorAll('.module-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const id = chip.dataset.id;
                if(selectedModules.includes(id)) {
                    selectedModules = selectedModules.filter(m => m !== id);
                    chip.classList.remove('selected');
                } else {
                    selectedModules.push(id);
                    chip.classList.add('selected');
                }
            });
        });

        function openUserModal() {
            document.getElementById('modalTitle').innerHTML = 'Add New <span class="text-blue-500">Personnel</span>';
            document.getElementById('userForm').reset();
            document.getElementById('editUserId').value = "";
            selectedModules = [];
            document.querySelectorAll('.module-chip').forEach(c => c.classList.remove('selected'));
            document.getElementById('userModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        // CRUD: Save / Update User
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editUserId').value;
            
            const userData = {
                name: document.getElementById('userName').value.toUpperCase(),
                pin: document.getElementById('userPin').value,
                role: document.getElementById('userRole').value,
                modules: selectedModules,
                updatedAt: new Date()
            };

            try {
                if(editId) {
                    await window.fs.updateDoc(window.fs.doc(window.db, "system_users", editId), userData);
                } else {
                    await window.fs.addDoc(window.fs.collection(window.db, "system_users"), userData);
                }
                closeModal();
            } catch(err) { alert("Error: " + err.message); }
        });

        // CRUD: Real-time Sync
        function startUserSync() {
            if(!window.db) return;
            window.fs.onSnapshot(
                window.fs.query(window.fs.collection(window.db, "system_users"), window.fs.orderBy("name", "asc")),
                (snap) => {
                    const list = document.getElementById('userList');
                    list.innerHTML = "";
                    snap.forEach(docSnap => {
                        const u = docSnap.data();
                        const id = docSnap.id;
                        list.innerHTML += `
                        <div class="glass p-8 rounded-[2.5rem] flex justify-between items-center border border-white/5 group hover:border-blue-500/30 transition">
                            <div class="flex items-center gap-5">
                                <div class="w-14 h-14 bg-gradient-to-br from-blue-600/20 to-transparent rounded-2xl flex items-center justify-center border border-blue-500/10">
                                    <i class="fas fa-user-shield text-blue-500"></i>
                                </div>
                                <div>
                                    <h4 class="font-black uppercase tracking-tighter text-white">${u.name}</h4>
                                    <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1 italic">${u.role} • ${u.modules.length} Modules</p>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="editUser('${id}')" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-blue-400 hover:bg-blue-600 hover:text-white transition"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deleteUser('${id}')" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-slate-700 hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`;
                    });
                }
            );
        }

        window.editUser = async (id) => {
            const docSnap = await window.fs.getDoc(window.fs.doc(window.db, "system_users", id));
            if(!docSnap.exists()) return;
            const u = docSnap.data();
            
            document.getElementById('modalTitle').innerHTML = 'Edit <span class="text-blue-500">Personnel</span>';
            document.getElementById('editUserId').value = id;
            document.getElementById('userName').value = u.name;
            document.getElementById('userPin').value = u.pin;
            document.getElementById('userRole').value = u.role;
            
            selectedModules = u.modules || [];
            document.querySelectorAll('.module-chip').forEach(chip => {
                if(selectedModules.includes(chip.dataset.id)) chip.classList.add('selected');
                else chip.classList.remove('selected');
            });
            
            document.getElementById('userModal').classList.add('active');
        }

        window.deleteUser = async (id) => {
            if(confirm("Padam akses kakitangan ini secara kekal?")) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "system_users", id));
            }
        }
    </script>
</body>
</html>
