<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; padding-bottom: 50px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-active { background: #3b82f6 !important; opacity: 1 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        
        @media print { 
            .no-print { display: none !important; } 
            body { background: white !important; color: black !important; padding: 0; } 
            .glass { border: none; background: transparent; } 
        }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="main-app">
        <div class="no-print mb-8 animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-black uppercase tracking-widest text-blue-500 italic">KETICK <span class="text-white">BILLING</span></h1>
                    <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">CRM Integrated System</p>
                </div>
                <select id="doc-type" onchange="updateUIForType()" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-[10px] font-black uppercase outline-none focus:border-blue-500">
                    <option value="INVOICE">Invoice</option>
                    <option value="QUOTATION">Quotation</option>
                    <option value="RECEIPT">Receipt</option>
                </select>
            </div>
            
            <div class="flex gap-2 p-1.5 glass rounded-2xl mb-6 shadow-2xl">
                <button onclick="switchTab('creator')" id="tab-creator" class="tab-active flex-1 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all">PENYEDIAAN</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 rounded-xl text-[10px] font-black tracking-widest opacity-40 transition-all uppercase">Rekod Arkib</button>
            </div>
        </div>

        <div id="section-creator" class="animate-in slide-in-from-bottom-4 duration-500">
            <div class="no-print flex gap-2 mb-6 justify-end">
                <button onclick="resetForm()" class="bg-slate-800 px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition">
                    <i class="fas fa-file-signature mr-1"></i> BARU
                </button>
                <button id="btnSave" onclick="generatePDF(true)" class="bg-blue-600 px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition hover:bg-blue-500 shadow-xl shadow-blue-600/20">
                    <i class="fas fa-save mr-1"></i> <span id="save-btn-text">SIMPAN & PDF</span>
                </button>
            </div>

            <div id="document-area" class="glass p-8 lg:p-12 rounded-[2.5rem] relative border border-white/5 shadow-2xl">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <input type="text" id="bizName" value="KETICK OS" class="bg-transparent text-2xl font-black text-blue-500 outline-none w-full uppercase italic tracking-tighter">
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-1">Digital Business Solution</p>
                    </div>
                    <div class="text-right">
                        <h3 class="text-3xl font-black uppercase tracking-tighter italic" id="display-doc-title">Invoice</h3>
                        <p class="text-[11px] text-slate-500 font-mono font-bold mt-1" id="doc-id">...</p>
                    </div>
                </div>
                
                <hr class="border-white/5 mb-10">

                <div class="grid grid-cols-2 gap-8 mb-12 text-sm">
                    <div class="space-y-4">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.2em]">Kepada:</p>
                        <div class="relative">
                            <input type="text" id="custName" list="contact-options" oninput="syncContactInfo()" placeholder="Pilih atau Taip Nama" class="w-full bg-transparent font-black text-white outline-none border-b-2 border-dashed border-white/10 pb-2 text-sm uppercase italic focus:border-blue-500 transition-all">
                            <datalist id="contact-options"></datalist>
                        </div>
                        <input type="text" id="custPhone" placeholder="No. Telefon (601...)" class="w-full bg-transparent text-[11px] font-bold outline-none border-b border-white/5 pb-1 opacity-60">
                    </div>
                    <div class="text-right space-y-4">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.2em]">Tarikh Dokumen:</p>
                        <input type="date" id="doc-date" class="bg-slate-900/50 p-2 rounded-lg font-black text-[11px] outline-none text-right border border-white/5 text-blue-400">
                    </div>
                </div>

                <div class="mb-12 overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[9px] font-black text-slate-500 border-b border-white/10 uppercase tracking-widest">
                                <th class="pb-4">Item / Deskripsi</th>
                                <th class="pb-4 text-center w-20">Unit</th>
                                <th class="pb-4 text-right w-32">Harga (RM)</th>
                            </tr>
                        </thead>
                        <tbody id="item-list"></tbody>
                    </table>
                    <button onclick="addItem()" class="no-print mt-6 text-[10px] font-black text-blue-500 uppercase tracking-widest flex items-center gap-2 hover:text-white transition-all">
                        <div class="w-5 h-5 bg-blue-500/10 rounded-md flex items-center justify-center"><i class="fas fa-plus text-[8px]"></i></div> Tambah Item
                    </button>
                </div>

                <div class="flex justify-between items-center pt-10 border-t border-white/10">
                    <div id="receipt-stamp" class="hidden border-4 border-emerald-500/30 text-emerald-500/30 font-black px-6 py-2 rounded-2xl rotate-[-15deg] uppercase text-2xl tracking-tighter">PAID</div>
                    <div class="text-right ml-auto">
                        <p class="text-[10px] text-slate-500 font-black uppercase mb-1 tracking-widest italic">Jumlah Keseluruhan</p>
                        <h2 class="text-4xl font-black text-emerald-500 italic">RM <span id="grand-total">0.00</span></h2>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-history" class="hidden animate-in fade-in duration-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="history-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, serverTimestamp, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import firebaseConfig from '../firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Bridge to window
        window.db = db;
        window.fs = { collection, addDoc, onSnapshot, query, where, getDocs, serverTimestamp, orderBy, deleteDoc, doc, updateDoc };

        initData();
    </script>

    <script>
        let activeEditId = null;
        let contactsData = [];
        let currentInvoices = [];

        function initData() {
            if(!window.db) return setTimeout(initData, 500);

            // Listen to Invoices
            const invQuery = window.fs.query(window.fs.collection(window.db, "invoices"), window.fs.orderBy("createdAt", "desc"));
            window.fs.onSnapshot(invQuery, (snapshot) => {
                currentInvoices = [];
                snapshot.forEach((doc) => currentInvoices.push({ id: doc.id, ...doc.data() }));
                renderHistoryUI(currentInvoices);
                if (!activeEditId) updateDocID();
            });

            // Listen to Contacts
            const contactQuery = window.fs.query(window.fs.collection(window.db, "contacts"), window.fs.orderBy("name", "asc"));
            window.fs.onSnapshot(contactQuery, (snapshot) => {
                contactsData = [];
                const list = document.getElementById('contact-options');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const c = doc.data();
                    contactsData.push(c);
                    const opt = document.createElement('option');
                    opt.value = c.name;
                    list.appendChild(opt);
                });
            });
        }

        function syncContactInfo() {
            const selectedName = document.getElementById('custName').value;
            const contact = contactsData.find(c => c.name.toUpperCase() === selectedName.toUpperCase());
            if(contact) {
                document.getElementById('custPhone').value = contact.phone;
            }
        }

        function updateDocID() {
            const type = document.getElementById('doc-type').value;
            const prefix = type === 'QUOTATION' ? 'QT' : (type === 'RECEIPT' ? 'RC' : 'INV');
            const sameTypeDocs = currentInvoices.filter(d => (d.docType || 'INVOICE') === type);
            const nextId = String(sameTypeDocs.length + 1).padStart(4, '0');
            const year = new Date().getFullYear();
            document.getElementById('doc-id').innerText = `${prefix}-${year}-${nextId}`;
        }

        function updateUIForType() {
            const type = document.getElementById('doc-type').value;
            const titleEl = document.getElementById('display-doc-title');
            const stamp = document.getElementById('receipt-stamp');
            
            titleEl.innerText = type;
            if(type === 'QUOTATION') {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-amber-500 italic";
                stamp.classList.add('hidden');
            } else if(type === 'RECEIPT') {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-emerald-500 italic";
                stamp.classList.remove('hidden');
            } else {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-blue-400 italic";
                stamp.classList.add('hidden');
            }
            updateDocID();
        }

        function calculateTotal() {
            let total = 0;
            const rows = document.querySelectorAll('#item-list tr');
            rows.forEach(tr => {
                const qty = tr.querySelector('.qty').value || 0;
                const price = tr.querySelector('.price').value || 0;
                total += (parseFloat(qty) * parseFloat(price));
            });
            document.getElementById('grand-total').innerText = total.toFixed(2);
        }

        function addItem(desc = "", qty = 1, price = "0.00") {
            const row = `
                <tr class="border-b border-white/5 group">
                    <td class="py-5">
                        <input type="text" value="${desc}" placeholder="Nama servis/produk..." class="desc-input bg-transparent text-sm font-bold w-full outline-none text-white uppercase tracking-tight focus:text-blue-400 transition-all">
                    </td>
                    <td class="py-5 text-center">
                        <input type="number" value="${qty}" oninput="calculateTotal()" class="qty bg-transparent text-sm font-black text-center w-full outline-none text-slate-400 focus:text-white">
                    </td>
                    <td class="py-5 text-right">
                        <input type="number" value="${price}" oninput="calculateTotal()" class="price bg-transparent text-sm font-black text-right w-full outline-none text-slate-400 focus:text-white">
                    </td>
                </tr>`;
            document.getElementById('item-list').insertAdjacentHTML('beforeend', row);
            calculateTotal();
        }

        async function generatePDF(shouldSave = false) {
            const invNo = document.getElementById('doc-id').innerText;
            const element = document.getElementById('document-area');
            const btn = document.getElementById('btnSave');
            
            if(shouldSave) {
                btn.disabled = true;
                const items = [];
                document.querySelectorAll('#item-list tr').forEach(tr => {
                    const desc = tr.querySelector('.desc-input').value;
                    if(desc) {
                        items.push({
                            desc: desc.toUpperCase(),
                            qty: tr.querySelector('.qty').value,
                            price: tr.querySelector('.price').value
                        });
                    }
                });

                const payload = {
                    invoiceNo: invNo,
                    docType: document.getElementById('doc-type').value,
                    customerName: document.getElementById('custName').value || 'PELANGGAN AM',
                    customerPhone: document.getElementById('custPhone').value,
                    totalAmount: document.getElementById('grand-total').innerText,
                    date: document.getElementById('doc-date').value,
                    items: items,
                    updatedAt: window.fs.serverTimestamp()
                };

                try {
                    if (activeEditId) {
                        await window.fs.updateDoc(window.fs.doc(window.db, "invoices", activeEditId), payload);
                    } else {
                        payload.createdAt = window.fs.serverTimestamp();
                        await window.fs.addDoc(window.fs.collection(window.db, "invoices"), payload);
                    }
                } catch (e) { 
                    btn.disabled = false;
                    return alert("Gagal Simpan: " + e.message); 
                }
            }

            const opt = {
                margin: 10,
                filename: `KETICK_${invNo}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, backgroundColor: '#020617' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                if(shouldSave) {
                    alert("Dokumen Berjaya Dijana & Disimpan!");
                    resetForm();
                    btn.disabled = false;
                }
            });
        }

        function renderHistoryUI(invoices) {
            const container = document.getElementById('history-container');
            if(invoices.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-[0.3em]">Tiada Rekod Dijumpai</div>';
                return;
            }
            container.innerHTML = invoices.map(inv => `
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 flex flex-col gap-5 hover:border-blue-500/30 transition-all duration-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[7px] font-black px-2 py-1 rounded-md bg-white/5 mb-2 inline-block tracking-widest uppercase opacity-60 border border-white/5">${inv.docType || 'INVOICE'}</span>
                            <h4 class="font-black text-sm uppercase italic tracking-tight leading-tight">${inv.customerName}</h4>
                            <p class="text-[9px] text-slate-500 font-mono mt-1 font-bold">${inv.invoiceNo} • ${inv.date}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black ${inv.docType === 'QUOTATION' ? 'text-amber-500' : (inv.docType === 'RECEIPT' ? 'text-emerald-500' : 'text-blue-400')} font-mono leading-none italic">RM ${inv.totalAmount}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 border-t border-white/5 pt-4">
                        <button onclick="editInvoice('${inv.id}')" class="flex-1 bg-white/5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">Buka & Edit</button>
                        <button onclick="deleteInvoice('${inv.id}')" class="bg-red-500/10 text-red-500 px-4 rounded-xl hover:bg-red-600 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function editInvoice(id) {
            const inv = currentInvoices.find(i => i.id === id);
            if(!inv) return;
            activeEditId = id;
            document.getElementById('doc-type').value = inv.docType || 'INVOICE';
            updateUIForType();
            document.getElementById('save-btn-text').innerText = "KEMASKINI & PDF";
            document.getElementById('doc-id').innerText = inv.invoiceNo;
            document.getElementById('custName').value = inv.customerName;
            document.getElementById('custPhone').value = inv.customerPhone || '';
            document.getElementById('doc-date').value = inv.date;
            document.getElementById('item-list').innerHTML = '';
            if(inv.items) inv.items.forEach(item => addItem(item.desc, item.qty, item.price));
            else addItem();
            calculateTotal();
            switchTab('creator');
        }

        async function deleteInvoice(id) {
            if(confirm("Padam rekod ini dari pangkalan data?")) {
                try { 
                    await window.fs.deleteDoc(window.fs.doc(window.db, "invoices", id)); 
                } catch (e) { alert(e.message); }
            }
        }

        function resetForm() {
            activeEditId = null;
            document.getElementById('custName').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('doc-date').valueAsDate = new Date();
            document.getElementById('item-list').innerHTML = '';
            addItem();
            calculateTotal();
            updateDocID();
            document.getElementById('save-btn-text').innerText = "SIMPAN & PDF";
        }

        function switchTab(tab) {
            document.getElementById('section-creator').classList.toggle('hidden', tab !== 'creator');
            document.getElementById('section-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-creator').classList.toggle('tab-active', tab === 'creator');
            document.getElementById('tab-history').classList.toggle('tab-active', tab === 'history');
        }

        // Initialize First State
        document.addEventListener('DOMContentLoaded', () => {
            addItem();
            document.getElementById('doc-date').valueAsDate = new Date();
        });
    </script>
</body>
</html>
